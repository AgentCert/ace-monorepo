# ── Postgres ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-postgres-data
  namespace: {{ include "ace.namespace" . }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.storage.langfusePostgres }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ include "ace.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      imagePullSecrets:
        - name: jfrog-registry
      containers:
        - name: postgres
          image: {{ include "ace.image" (dict "img" .Values.images.postgres "reg" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.infraImagePullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_DB
                  optional: true
            - name: TZ
              value: UTC
            - name: PGTZ
              value: UTC
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres]
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "ace.namespace" . }}
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

# ── Redis ──────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-redis-data
  namespace: {{ include "ace.namespace" . }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.storage.langfuseRedis }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "ace.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      imagePullSecrets:
        - name: jfrog-registry
      containers:
        - name: redis
          image: {{ include "ace.image" (dict "img" .Values.images.redis "reg" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.infraImagePullPolicy }}
          command: [redis-server]
          args:
            - --requirepass
            - $(REDIS_AUTH)
            - --maxmemory-policy
            - noeviction
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: REDIS_AUTH
                  optional: true
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "ace.namespace" . }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

# ── ClickHouse ─────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-clickhouse-data
  namespace: {{ include "ace.namespace" . }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.storage.langfuseClickhouse }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-clickhouse-logs
  namespace: {{ include "ace.namespace" . }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.storage.langfuseClickhouseLogs }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: {{ include "ace.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      imagePullSecrets:
        - name: jfrog-registry
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: clickhouse
          image: {{ include "ace.image" (dict "img" .Values.images.clickhouse "reg" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.infraImagePullPolicy }}
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_DB
              value: default
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: CLICKHOUSE_USER
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: CLICKHOUSE_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-clickhouse-data
        - name: logs
          persistentVolumeClaim:
            claimName: langfuse-clickhouse-logs
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: {{ include "ace.namespace" . }}
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000

# ── MinIO ──────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-minio-data
  namespace: {{ include "ace.namespace" . }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.storage.langfuseMinio }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ include "ace.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      imagePullSecrets:
        - name: jfrog-registry
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: minio
          image: {{ include "ace.image" (dict "img" .Values.images.minio "reg" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.infraImagePullPolicy }}
          command: [sh]
          args:
            - -c
            - mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: MINIO_ROOT_USER
                  optional: true
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: MINIO_ROOT_PASSWORD
                  optional: true
          readinessProbe:
            exec:
              command: [mc, ready, local]
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ include "ace.namespace" . }}
spec:
  selector:
    app: minio
  type: NodePort
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      nodePort: 32090
    - name: console
      port: 9001
      targetPort: 9001

# ── Langfuse Worker ────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-worker
  namespace: {{ include "ace.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-worker
  template:
    metadata:
      labels:
        app: langfuse-worker
    spec:
      imagePullSecrets:
        - name: jfrog-registry
      containers:
        - name: langfuse-worker
          image: {{ include "ace.image" (dict "img" .Values.images.langfuseWorker "reg" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.infraImagePullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_DB
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://clickhouse:9000"
            - name: CLICKHOUSE_URL
              value: "http://clickhouse:8123"
            - name: CLICKHOUSE_CLUSTER_ENABLED
              value: "false"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: "http://minio:9000"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: "http://minio:9000"
            - name: LANGFUSE_S3_BATCH_EXPORT_ENDPOINT
              value: "http://minio:9000"

# ── Langfuse Web ───────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-web
  namespace: {{ include "ace.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-web
  template:
    metadata:
      labels:
        app: langfuse-web
    spec:
      imagePullSecrets:
        - name: jfrog-registry
      containers:
        - name: langfuse-web
          image: {{ include "ace.image" (dict "img" .Values.images.langfuseWeb "reg" .Values.imageRegistry) }}
          imagePullPolicy: {{ .Values.infraImagePullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_DB
                  optional: true
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://clickhouse:9000"
            - name: CLICKHOUSE_URL
              value: "http://clickhouse:8123"
            - name: CLICKHOUSE_CLUSTER_ENABLED
              value: "false"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: "http://minio:9000"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: "http://minio:9000"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_EXTERNAL_ENDPOINT
              value: "http://localhost:9090"
            - name: LANGFUSE_S3_BATCH_EXPORT_ENDPOINT
              value: "http://minio:9000"
            - name: LANGFUSE_INIT_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: LANGFUSE_ORG_ID
                  optional: true
            - name: LANGFUSE_INIT_ORG_NAME
              value: "AgentCert"
            - name: LANGFUSE_INIT_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: LANGFUSE_PROJECT_ID
                  optional: true
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: "agentcert"
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: LANGFUSE_PUBLIC_KEY
                  optional: true
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: LANGFUSE_SECRET_KEY
                  optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-web
  namespace: {{ include "ace.namespace" . }}
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  selector:
    app: langfuse-web
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
