apiVersion: v1
kind: ServiceAccount
metadata:
  name: graphql
  namespace: {{ include "ace.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ace-graphql-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: graphql
    namespace: {{ include "ace.namespace" . }}
