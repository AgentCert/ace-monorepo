# =============================================================================
# ACE Helm chart — default values
#
# Credentials (env vars) are passed via -f values-env.yaml, generated from
# the root .env by scripts/setup.sh. Never edit values-env.yaml by hand —
# re-run setup.sh to regenerate it.
# =============================================================================

secretName: ace-env

# ── Environment variables (populated from .env by setup.sh) ──────────────────
# scripts/setup.sh generates deploy/helm/ace/values-env.yaml with every
# KEY: "value" from .env under this key, then passes -f values-env.yaml.
env: {}

# ── Image Registry ────────────────────────────────────────────────────────────
# Set to prefix all agentcert/* images. Leave empty for Docker Hub default.
imageRegistry: "infyartifactory.jfrog.io/docker-local"

# ── Images ────────────────────────────────────────────────────────────────────
# All images prefixed with imageRegistry above. Behind corporate proxy (Zscaler),
# direct pulls from docker.io/ghcr.io fail — everything goes through JFrog.
images:
  graphql:        agentcert/agentcert-graphql:latest
  auth:           agentcert/agentcert-auth:latest
  web:            agentcert/agentcert-web:latest
  certifier:      agentcert/certifier:latest
  litellm:        litellm/litellm:v1.82.0-stable
  mongodb:        mongo:5
  postgres:       postgres:17
  redis:          redis:7
  clickhouse:     clickhouse/clickhouse-server
  minio:          minio
  langfuseWeb:    langfuse/langfuse:3
  langfuseWorker: langfuse/langfuse-worker:3
  busybox:        busybox:1.36
  alpineGit:      alpine/git

# Always for agentcert/* images (tagged :latest — must re-pull on every deploy)
# IfNotPresent for pinned third-party images (mongo:5, postgres:17, etc.)
imagePullPolicy: Always
infraImagePullPolicy: IfNotPresent

# ── Persistent storage sizes ─────────────────────────────────────────────────
storage:
  mongodb:                5Gi
  certifierWorkspace:     2Gi
  litellm:                1Gi
  langfusePostgres:       5Gi
  langfuseRedis:          1Gi
  langfuseClickhouse:     10Gi
  langfuseClickhouseLogs: 2Gi
  langfuseMinio:          10Gi

# ── LiteLLM config ────────────────────────────────────────────────────────────
# Leave empty here — setup.sh injects the real config via values-env.yaml.
litellm:
  config: |
    # placeholder — injected by scripts/setup.sh via values-env.yaml
    model_list: []
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
