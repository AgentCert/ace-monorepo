---
# JFrog Registry Secret Sync — Permanent Fix
#
# Problem the old CronJob had:
#   1. Race condition: CronJob fires every 60s but pods start immediately when a
#      dynamic namespace (litmus/sock-shop) is created from the UI → ImagePullBackOff.
#   2. Secret only created, never updated → stale on credential rotation.
#   3. SA patch was destructive: replaced imagePullSecrets instead of appending.
#   4. set -e caused early exit: one bad namespace stopped all remaining syncs.
#
# This Deployment fixes all four by:
#   - Watching namespace events with kubectl --watch → syncs within seconds of creation.
#   - Periodic full reconciliation every 60s as a safety net / credential update.
#   - Always applying secrets (create-or-update via --dry-run | apply).
#   - Additive SA patching: JSON-patch append to existing array, merge-patch fallback.
#   - Per-operation error handling: one failed namespace never aborts the rest.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jfrog-secret-sync
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jfrog-secret-sync
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jfrog-secret-sync
subjects:
  - kind: ServiceAccount
    name: jfrog-secret-sync
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: jfrog-secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jfrog-secret-sync
  namespace: kube-system
  labels:
    app: jfrog-secret-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jfrog-secret-sync
  template:
    metadata:
      labels:
        app: jfrog-secret-sync
    spec:
      serviceAccountName: jfrog-secret-sync
      imagePullSecrets:
        - name: jfrog-registry
      containers:
        - name: sync
          image: infyartifactory.jfrog.io/docker-local/agentcert/agentcert-install-agent:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              SOURCE_NS="kube-system"
              SECRET_NAME="jfrog-registry"

              # sync_namespace copies the jfrog-registry secret to a single namespace
              # and additively patches all ServiceAccounts there.
              sync_namespace() {
                local ns="$1"
                case "$ns" in
                  kube-node-lease|kube-public|"") return 0 ;;
                esac

                # Bail out if the source secret is missing (avoids copying garbage).
                local DOCKER_CONFIG
                DOCKER_CONFIG=$(kubectl get secret "$SECRET_NAME" -n "$SOURCE_NS" \
                  -o jsonpath='{.data.\.dockerconfigjson}' 2>/dev/null) || return 0
                [ -z "$DOCKER_CONFIG" ] && return 0

                # Decode to a temp file — avoids /dev/stdin unreliability in containers.
                local TMP
                TMP=$(mktemp)
                echo "$DOCKER_CONFIG" | base64 -d > "$TMP" 2>/dev/null || { rm -f "$TMP"; return 0; }

                # Create OR update the secret (idempotent).
                kubectl create secret generic "$SECRET_NAME" \
                  --namespace "$ns" \
                  --type=kubernetes.io/dockerconfigjson \
                  "--from-file=.dockerconfigjson=$TMP" \
                  --dry-run=client -o yaml 2>/dev/null | kubectl apply -f - 2>/dev/null || true
                rm -f "$TMP"

                # Patch every SA in the namespace — ADDITIVE (preserve existing entries).
                local sa EXISTING
                for sa in $(kubectl get sa -n "$ns" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                  EXISTING=$(kubectl get sa "$sa" -n "$ns" \
                    -o jsonpath='{.imagePullSecrets[*].name}' 2>/dev/null)
                  if [[ "$EXISTING" != *"$SECRET_NAME"* ]]; then
                    # Try JSON-patch append first (non-destructive when array already exists).
                    # Falls back to merge-patch set when imagePullSecrets is absent.
                    kubectl patch sa "$sa" -n "$ns" --type=json \
                      -p "[{\"op\":\"add\",\"path\":\"/imagePullSecrets/-\",\"value\":{\"name\":\"$SECRET_NAME\"}}]" \
                      2>/dev/null || \
                    kubectl patch sa "$sa" -n "$ns" --type=merge \
                      -p "{\"imagePullSecrets\":[{\"name\":\"$SECRET_NAME\"}]}" 2>/dev/null || true
                  fi
                done

                echo "[jfrog-sync] Synced: $ns ($(date -u +%H:%M:%SZ))"
              }

              sync_all() {
                local ns
                for ns in $(kubectl get namespaces \
                    -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
                  sync_namespace "$ns"
                done
              }

              # ── Startup: full cluster sync ──────────────────────────────────────────
              echo "[jfrog-sync] Starting — initial full sync at $(date -u)"
              sync_all
              echo "[jfrog-sync] Initial sync complete at $(date -u)"

              # ── Namespace watcher: reacts immediately to any new/Active namespace ───
              # Restarts the watch automatically if kubectl loses the connection.
              (
                while true; do
                  kubectl get namespaces --watch --no-headers 2>/dev/null | \
                  while read -r ns_name status age; do
                    if [[ "$status" == "Active" ]]; then
                      echo "[jfrog-sync] Namespace event: $ns_name — syncing immediately"
                      sync_namespace "$ns_name"
                    fi
                  done
                  echo "[jfrog-sync] Watch connection lost — reconnecting in 5s"
                  sleep 5
                done
              ) &

              # ── Periodic reconciliation: picks up any missed events ─────────────────
              while true; do
                sleep 60
                sync_all
                echo "[jfrog-sync] Periodic sync complete at $(date -u)"
              done
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
