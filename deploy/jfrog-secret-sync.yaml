---
# JFrog Registry Secret Sync
# Ensures jfrog-registry imagePullSecret exists in ALL namespaces and patches
# all ServiceAccounts. Runs every 60s to catch dynamically created namespaces
# (e.g. litmus infra connected from UI).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jfrog-secret-sync
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jfrog-secret-sync
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jfrog-secret-sync
subjects:
  - kind: ServiceAccount
    name: jfrog-secret-sync
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: jfrog-secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jfrog-secret-sync
  namespace: kube-system
spec:
  schedule: "* * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 55
      template:
        spec:
          serviceAccountName: jfrog-secret-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  SOURCE_NS="kube-system"
                  SECRET_NAME="jfrog-registry"

                  # Check source secret exists
                  if ! kubectl get secret "$SECRET_NAME" -n "$SOURCE_NS" >/dev/null 2>&1; then
                    echo "ERROR: Source secret $SECRET_NAME not found in $SOURCE_NS"
                    exit 1
                  fi

                  # Get the dockerconfigjson from source
                  DOCKER_CONFIG=$(kubectl get secret "$SECRET_NAME" -n "$SOURCE_NS" -o jsonpath='{.data.\.dockerconfigjson}')

                  # Sync to all namespaces
                  for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
                    # Skip system namespaces that don't need it
                    case "$ns" in
                      kube-node-lease|kube-public) continue ;;
                    esac

                    # Create/update secret in target namespace
                    if ! kubectl get secret "$SECRET_NAME" -n "$ns" >/dev/null 2>&1; then
                      kubectl create secret docker-registry "$SECRET_NAME" \
                        --namespace "$ns" \
                        --from-file=.dockerconfigjson=/dev/stdin \
                        --dry-run=client -o yaml <<< "$(echo "$DOCKER_CONFIG" | base64 -d)" \
                        | kubectl apply -f - >/dev/null
                      echo "Created $SECRET_NAME in $ns"
                    fi

                    # Patch all ServiceAccounts in namespace
                    for sa in $(kubectl get sa -n "$ns" -o jsonpath='{.items[*].metadata.name}'); do
                      EXISTING=$(kubectl get sa "$sa" -n "$ns" -o jsonpath='{.imagePullSecrets[*].name}' 2>/dev/null)
                      if [[ "$EXISTING" != *"$SECRET_NAME"* ]]; then
                        kubectl patch sa "$sa" -n "$ns" \
                          -p "{\"imagePullSecrets\": [{\"name\": \"$SECRET_NAME\"}]}" >/dev/null 2>&1 || true
                      fi
                    done
                  done
                  echo "Sync complete: $(date)"
