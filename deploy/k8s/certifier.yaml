# =============================================================================
# Certifier API
#   http://localhost:8000/docs  (host :8000 via NodePort 32080)
#
# Workspace PVC gives the certifier a persistent scratch area for cert
# artifacts; the init container pre-creates the directory tree as uid 1000.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: certifier-workspace
  namespace: ace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certifier
  namespace: ace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: certifier
  template:
    metadata:
      labels:
        app: certifier
    spec:
      initContainers:
        - name: workspace-init
          image: busybox:1.36
          command: [sh, -c, "mkdir -p /ws/cert && chown -R 1000:1000 /ws && chmod 755 /ws"]
          volumeMounts:
            - name: workspace
              mountPath: /ws
      containers:
        - name: certifier
          image: agentcert/certifier:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ace-env
          env:
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ace-env
                  key: MONGODB_USERNAME
                  optional: true
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ace-env
                  key: MONGODB_PASSWORD
                  optional: true
            - name: MONGODB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: ace-env
                  key: MONGODB_DATABASE
                  optional: true
            # MongoDB via cluster service (directConnection bypasses rs topology)
            - name: MONGODB_CONNECTION_STRING
              value: "mongodb://$(MONGODB_USERNAME):$(MONGODB_PASSWORD)@mongodb:27017/$(MONGODB_DATABASE)?authSource=admin&directConnection=true"
            # Langfuse is a K8s service in the same namespace
            - name: LANGFUSE_HOST
              value: "http://langfuse-web:3000"
            - name: PYTHONPATH
              value: "/app"
            - name: API_PORT
              value: "8000"
            - name: WORKSPACE_DIR
              value: "/app/workspace"
            - name: CERT_WORKSPACE_DIR
              value: "/app/workspace/cert"
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 6
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: certifier-workspace
---
apiVersion: v1
kind: Service
metadata:
  name: certifier
  namespace: ace
spec:
  selector:
    app: certifier
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 32080
