# =============================================================================
# Jekyll config for the ACE docs site (built from docs/).
# Theme: just-the-docs v0.6.2 — searchable left sidebar, mobile nav.
# Build: GitHub Actions workflow (.github/workflows/pages.yml) with Jekyll 4
# and Dart Sass (sass-embedded). See docs/Gemfile for gem versions.
# =============================================================================

title: ACE
description: >-
  Agent Certification Engine — evaluate, fault-inject, and certify autonomous
  agents under controlled chaos. One-command setup, three cluster routes, and a
  reproducible certification pipeline.

remote_theme: just-the-docs/just-the-docs@v0.6.2

# All plugins must be listed here when building outside the github-pages gem.
plugins:
  - jekyll-remote-theme         # pulls the just-the-docs theme
  - jekyll-relative-links       # resolves relative .md links to page URLs
  - jekyll-seo-tag              # <title>/meta/OpenGraph tags
  - jekyll-include-cache        # required by just-the-docs
  - jekyll-optional-front-matter # pages without front matter
  - jekyll-default-layout       # auto-assigns layout to pages
  - jekyll-titles-from-headings # extracts page title from first H1
  - jekyll-github-metadata      # exposes GitHub repo metadata
  - jekyll-paginate             # pagination support
  - jekyll-gist                 # GitHub Gist embedding

# ── just-the-docs options ────────────────────────────────────────────────────
color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3
heading_anchors: true

# Top-right auxiliary link
aux_links:
  "GitHub ↗":
    - "https://github.com/AgentCert/ace-monorepo"
aux_links_new_tab: true

# Footer
back_to_top: true
back_to_top_text: "Back to top"
footer_content: >-
  ACE — Agent Certification Engine · Released under the MIT License.
last_edit_timestamp: false

# Keep build output and tooling out of the source.
exclude:
  - _site/
  - Gemfile
  - Gemfile.lock
