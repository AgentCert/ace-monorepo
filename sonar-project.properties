# =============================================================================
# SonarQube analysis config for the ace-monorepo (multi-language)
# Server: http://localhost:9001  (SonarQube Community Edition)
# Run from repo root with the sonar-scanner CLI.
# =============================================================================
sonar.projectKey=ace-monorepo
sonar.projectName=ACE Monorepo
sonar.projectVersion=1.0

# --- Source layout -----------------------------------------------------------
# Analyse the real source trees; exclude generated/vendored/dependency dirs.
sonar.sources=certifier,flash-agent,agent-sidecar,litmus-go,AgentCert/chaoscenter
sonar.sourceEncoding=UTF-8

# --- Global exclusions -------------------------------------------------------
sonar.exclusions=\
  **/.venv/**,\
  **/site-packages/**,\
  **/node_modules/**,\
  **/vendor/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/*.min.js,\
  **/*.pb.go,\
  **/*_generated.go,\
  **/*_grpc.pb.go,\
  **/models_gen.go,\
  **/generated.go,\
  **/graph/generated/**,\
  **/mocks/**,\
  **/*.ipynb,\
  **/coverage/**,\
  **/.git/**

# --- Test vs. main source classification -------------------------------------
# Declare the SAME roots as the test scope; test.inclusions then moves matching
# files OUT of main source and INTO the test set, so test code is NOT counted
# as production lines or in the coverage denominator.
sonar.tests=certifier,flash-agent,agent-sidecar,litmus-go,AgentCert/chaoscenter
sonar.test.inclusions=\
  **/test_*.py,\
  **/*_test.py,\
  **/tests/**,\
  **/*_test.go,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**

# --- Coverage report paths ---------------------------------------------------
# Python (certifier) -> Cobertura XML
sonar.python.coverage.reportPaths=certifier/coverage.xml
sonar.python.version=3.12

# Go -> coverprofiles from every module
sonar.go.coverage.reportPaths=\
  litmus-go/coverage.out,\
  AgentCert/chaoscenter/authentication/coverage.out,\
  AgentCert/chaoscenter/subscriber/coverage.out,\
  AgentCert/chaoscenter/event-tracker/coverage.out,\
  AgentCert/chaoscenter/upgrade-agents/control-plane/coverage.out,\
  AgentCert/chaoscenter/graphql/server/coverage.out

# JS/TS (web) -> lcov
sonar.javascript.lcov.reportPaths=AgentCert/chaoscenter/web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=AgentCert/chaoscenter/web/coverage/lcov.info
